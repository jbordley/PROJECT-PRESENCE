; ------------------------------------------------------------
; Sentinel Node — PlatformIO Configuration
; ------------------------------------------------------------
; Flash a specific node:  pio run -e node02 -t upload
; Monitor a specific node: pio run -e node02 -t monitor
; Flash + monitor:        pio run -e node02 -t upload && pio device monitor
; ------------------------------------------------------------

[platformio]
src_dir = .
default_envs = node01

; ------------------------------------------------------------
; Shared settings — inherited by all environments
; ------------------------------------------------------------
[common_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
board_build.partitions = default_8MB.csv

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
    adafruit/Adafruit BME680 Library@^2.0.4
    adafruit/Adafruit Unified Sensor@^1.1.14
build_unflags = -std=gnu++11

[common_c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = min_spiffs.csv
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_unflags = -std=gnu++11

; ------------------------------------------------------------
; ESP32-S3 Nodes (Tier 1–2: full sensor suite / radar + scan)
; ------------------------------------------------------------

[env:node01]
extends = common_s3
upload_port = COM15
monitor_port = COM15
build_flags =
    -include config_node01.h
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:node02]
extends = common_s3
upload_port = COM17
monitor_port = COM17
build_flags =
    -include config_node02.h
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:node03]
extends = common_s3
upload_port = COM18
monitor_port = COM18
build_flags =
    -include config_node03.h
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:node04]
extends = common_s3
upload_port = COM19
monitor_port = COM19
build_flags =
    -include config_node04.h
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

; ------------------------------------------------------------
; ESP32-C6 Probes (Tier 3: BLE/WiFi scan only)
; Waveshare ESP32-C6 boards — plug in USB-C to flash
; ------------------------------------------------------------

[env:node01_c6]
extends = common_c6
upload_port = COM13
monitor_port = COM13
build_flags =
    -include config_node01_c6.h
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:node02_c6]
extends = common_c6
upload_port = COMxx              ; ← Update when connected
monitor_port = COMxx
build_flags =
    -include config_node02_c6.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:node03_c6]
extends = common_c6
upload_port = COMxx              ; ← Update when connected
monitor_port = COMxx
build_flags =
    -include config_node03_c6.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:node04_c6]
extends = common_c6
upload_port = COMxx              ; ← Update when connected
monitor_port = COMxx
build_flags =
    -include config_node04_c6.h
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17
